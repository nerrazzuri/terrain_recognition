# Robot topic inventory — VERIFIED against AimDK SDK lx2501_3-v0.9.0.4 (docs + Python
# examples). Names confirmed; ROS message TYPES still to be confirmed with
# `ros2 topic info -v` on the live robot for the sensor topics (std sensor_msgs expected).
# Used by x2_common.topic_discovery and tools/check_topics.sh / check_qos.sh.

source_sdk: lx2501_3-v0.9.0.4

sensors:
  depth_image:
    name: /aima/hal/sensor/rgbd_head_front/depth_image
    type: sensor_msgs/msg/Image
    verified: true        # name confirmed in SDK
  depth_pointcloud:
    name: /aima/hal/sensor/rgbd_head_front/depth_pointcloud
    type: sensor_msgs/msg/PointCloud2
    verified: true
  depth_camera_info:
    name: /aima/hal/sensor/rgbd_head_front/depth_camera_info
    type: sensor_msgs/msg/CameraInfo
    verified: true
  rgbd_imu:
    name: /aima/hal/sensor/rgbd_head_front/imu
    type: sensor_msgs/msg/Imu
    verified: true
  lidar_pointcloud:
    name: /aima/hal/sensor/lidar_chest_front/lidar_pointcloud
    type: sensor_msgs/msg/PointCloud2
    verified: true
  lidar_imu:
    name: /aima/hal/sensor/lidar_chest_front/imu
    type: sensor_msgs/msg/Imu
    verified: true
  imu_chest:
    name: /aima/hal/imu/chest/state
    type: ""              # confirm with ros2 topic info -v
    verified: true        # name confirmed
  imu_torso:
    name: /aima/hal/imu/torso/state
    type: ""              # confirm; SDK also shows a "torse" typo variant — verify on robot
    verified: true

# Joint state/command topics (aimdk_msgs). Leg command is FORBIDDEN while the approval flag
# is false (see forbidden_while_unapproved). leg/state is used to verify joint order.
joints:
  leg_state:
    name: /aima/hal/joint/leg/state
    type: aimdk_msgs/msg/JointStateArray
    verified: true
  waist_state:
    name: /aima/hal/joint/waist/state
    type: aimdk_msgs/msg/JointStateArray
    verified: true

# Internal terrain topics published by this stack.
terrain:
  heightmap:    {name: /x2/terrain/heightmap,      type: x2_terrain_msgs/msg/TerrainGrid}
  status:       {name: /x2/terrain/status,         type: x2_terrain_msgs/msg/TerrainStatus}
  stair_estimate: {name: /x2/terrain/stair_estimate, type: x2_terrain_msgs/msg/StairEstimate}
  safety_decision: {name: /x2/terrain/safety_decision, type: x2_terrain_msgs/msg/SafetyDecision}
  policy_debug: {name: /x2/policy/debug,           type: x2_terrain_msgs/msg/PolicyDebug}

# Locomotion command output. Source MUST be registered before publishing (SDK v0.7+).
locomotion:
  velocity:
    name: /aima/mc/locomotion/velocity
    type: aimdk_msgs/msg/McLocomotionVelocity   # fields: forward_velocity, lateral_velocity, angular_velocity
    verified: true
    command_source: x2_terrain_safe_locomotion
    rate_hz: 50                                  # locomotion velocity runs at ~50 Hz (MC)
  # Input-source registration / query services (aimdk_msgs).
  set_input_source_service:
    name: /aimdk_msgs/srv/SetMcInputSource
    type: aimdk_msgs/srv/SetMcInputSource
    register_action_value: 1001                  # action.value to register a source
  get_input_source_service:
    name: /aimdk_msgs/srv/GetCurrentInputSource
    type: aimdk_msgs/srv/GetCurrentInputSource
  # Speed-mode services (MC): set/get low(1)/medium(2)/high(3). low_speed fwd bound = 0.8 m/s.
  set_speed_mode_service: {name: mc_set_locomotion_speed_mode_service}
  get_speed_mode_service: {name: mc_get_locomotion_speed_mode_service}

# Verified vs robot MC (lx2501_3_t2d5): input-source priorities rc=80 > vr=70 > app_proxy=60
# > interaction=50 > pnc=40; CommandGuard expiration_time = 200 ms. The leg joint command
# runs at 500 Hz. The physical remote controller (rc) always overrides lower-priority sources.

# Leg joint command — FORBIDDEN while REAL_ROBOT_LOW_LEVEL_LEG_POLICY_APPROVED is false.
forbidden_while_unapproved:
  leg_command:
    name: /aima/hal/joint/leg/command
    type: aimdk_msgs/msg/JointCommandArray
    verified: true
