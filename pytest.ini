[pytest]
# Make x2_common importable for unit tests without a full colcon build / install.
# (For full ROS2 runtime, source ros2_ws/install/setup.bash instead.)
pythonpath =
    ros2_ws/src/x2_common
    ros2_ws/src/x2_terrain_perception
    ros2_ws/src/x2_safe_locomotion
    ros2_ws/src/x2_policy_runtime
testpaths = tests
addopts = -ra
